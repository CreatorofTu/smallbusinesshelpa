name: "CodeQL security scan"

# Automated code scanning on every push and PR, plus a weekly sweep to
# catch newly-disclosed vulnerability patterns in code that hasn't
# changed. Free for this repo since it's public. Findings show up under
# the repo's Security tab, not here.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 7 * * 1" # every Monday

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
